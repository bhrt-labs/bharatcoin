name: Slither

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  slither:
    name: Static analysis (Slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (resolves @openzeppelin imports)
        run: npm install

      - name: Install Foundry (used only to compile for Slither)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "."
          slither-args: "--exclude-dependencies"
          fail-on: high
