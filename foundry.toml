# This file exists ONLY so the Slither CI job can resolve @openzeppelin imports
# via Foundry's remappings. This project is built and deployed with the npm-based
# scripts in scripts/ (solc + ethers), NOT Foundry — see the README. Nothing here
# affects the deployed, source-verified contracts.
[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
